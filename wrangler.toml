name = "tepi"
main = ".open-next/worker.js"
compatibility_date = "2026-07-03"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "tepi-db"
database_id = "ba5ea207-393f-478b-9f69-9a3f2568e03c"

[triggers]
crons = ["0 2 * * *"]

[vars]
NEXT_PUBLIC_APP_URL = "https://tepi.my.id"