name: Keep Supabase Alive

on:
  schedule:
    # Ping setiap Senin dan Kamis jam 09:00 UTC (16:00 WITA)
    - cron: '0 9 * * 1,4'
  # Bisa dijalankan manual dari tab Actions di GitHub
  workflow_dispatch:

jobs:
  ping:
    name: Ping Supabase Auth Health
    runs-on: ubuntu-latest
    steps:
      - name: Ping
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/auth/v1/health" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "HTTP Status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "❌ Ping gagal dengan status $STATUS"
            exit 1
          fi

          echo "✅ Supabase aktif"
