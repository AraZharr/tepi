name: Deploy Tepi

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Apply D1 migrations
        run: |
          for f in migrations/*.sql; do
            echo "Applying $f..."
            npx wrangler d1 execute tepi-db --remote --file="$f" || echo "Migration $f may have already been applied"
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Set runtime secrets
        run: |
          for pair in \
            "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" \
            "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" \
            "TURNSTILE_SECRET_KEY=${{ secrets.TURNSTILE_SECRET_KEY }}" \
            "ADMIN_USER_ID=${{ secrets.ADMIN_USER_ID }}" \
            "ADMIN_NOTIF_EMAIL=${{ secrets.ADMIN_NOTIF_EMAIL }}" \
            "PAYWUZ_API_KEY=${{ secrets.PAYWUZ_API_KEY }}" \
            "CF_ACCOUNT_ID=${{ secrets.CF_ACCOUNT_ID }}" \
            "CF_ZONE_ID=${{ secrets.CF_ZONE_ID }}" \
            "CF_API_TOKEN=${{ secrets.CF_API_TOKEN }}" \
            "CRON_SECRET=${{ secrets.CRON_SECRET }}" \
            "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}"; do
            key="${pair%%=*}"
            val="${pair#*=}"
            if [ -n "$val" ]; then
              echo "$val" | npx wrangler secret put "$key" || echo "⚠️ Failed to set $key"
            fi
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Build & Deploy (OpenNext)
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_ROOT_DOMAIN: ${{ secrets.NEXT_PUBLIC_ROOT_DOMAIN }}
